name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent:
    name: Agent (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: agent/requirements-dev.txt

      - name: Install system deps (portaudio for PyAudio)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends portaudio19-dev

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest, offline)
        run: pytest

  web-client:
    name: Web client (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
