name: Dependabot auto-merge

# Auto-merges Dependabot PRs for patch and minor updates once required
# status checks pass. Major updates still require manual review.
#
# Preconditions (set in repo settings before this is useful):
#   1. Settings → General → Pull Requests → "Allow auto-merge" enabled.
#   2. Branch protection on `main` with required status checks
#      (Agent (Python), Web client (Node)). Without required checks,
#      `gh pr merge --auto` will merge immediately regardless of CI
#      outcome.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # The head-commit signature check trips up rebased Dependabot
          # PRs (the rebase re-signs the commit with whoever ran it).
          # The job's outer `if:` already gates on `pull_request.user`
          # being dependabot[bot] — that's the right authentication
          # boundary; signature verification is redundant.
          skip-commit-verification: true

      - name: Enable auto-merge for patch / minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
