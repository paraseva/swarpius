[pytest]
# Disable output capture by default.  Pytest's capture plugin creates
# temp files that fail on WSL's Windows filesystem mount (/mnt/c/...).
# Use -s equivalent so tests Just Work on both native Linux and WSL.
# Exclude live Roon tests by default (run with: pytest -m live_roon).
addopts = -p no:cacheprovider --capture=no -m "not live_roon"
markers =
    live_roon: requires a running Roon Core (set LIVE_ROON_TESTS=1 to include)
